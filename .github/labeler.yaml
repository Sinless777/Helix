# .github/labeler.yaml

# ========== General Maintenance ==========
bug:
  - changed-files:
      - any-glob-to-any-file: '*.bug'
      - any-glob-to-any-file: 'fix/*'
      - any-glob-to-any-file: 'hotfix/*'

enhancement:
  - changed-files:
      - any-glob-to-any-file: '*.enhancement'
      - any-glob-to-any-file: 'improve/*'
      - any-glob-to-any-file: 'refactor/*'

chore:
  - changed-files:
      - any-glob-to-any-file: 'chore/*'
      - any-glob-to-any-file: '*.chore'

documentation:
  - changed-files:
      - any-glob-to-any-file: '*.docs'
      - any-glob-to-any-file: 'docs/*'
      - any-glob-to-any-file: 'readme/*'

tests:
  - changed-files:
      - any-glob-to-any-file: 'tests/*'
      - any-glob-to-any-file: '*.test'
      - any-glob-to-any-file: 'e2e/*'
      - any-glob-to-any-file: 'unit/*'

dependencies:
  - changed-files:
      - any-glob-to-any-file: 'deps/*'
      - any-glob-to-any-file: 'renovate/*'

ci-cd:
  - changed-files:
      - any-glob-to-any-file: '.github/workflows/*'
      - any-glob-to-any-file: 'ci/*'
      - any-glob-to-any-file: 'cd/*'
      - any-glob-to-any-file: 'pipeline/*'

