# .github/labeler.yaml

# ————— Branch-based labels —————
Bugfix:
  branches:
    - 'bugfix/*'

Hotfix:
  branches:
    - 'hotfix/*'

Feature:
  branches:
    - 'feature/*'

Release:
  branches:
    - 'release/*'

Support:
  branches:
    - 'support/*'


# ————— GitHub meta —————
GitHub:
  paths:
    - '.github/**'

GitHub-Workflows:
  paths:
    - '.github/workflows/**'

GitHub-Issue-Templates:
  paths:
    - '.github/ISSUE_TEMPLATE/**'


# ————— Major areas —————
APIs:
  paths:
    - 'apis/**'

User-Interfaces:
  paths:
    - 'user-interfaces/**'

Docker:
  paths:
    - 'docker/**'

Libs:
  paths:
    - 'libs/**'


# ————— Sample sub-areas —————
Authentication:
  paths:
    - 'apis/auth/**'

Discord-Bot:
  paths:
    - 'apis/discord-bot/**'

Frontend:
  paths:
    - 'user-interfaces/frontend/**'


# ————— Documentation & tests —————
Documentation:
  paths:
    - '**/*.md'
    - 'docs/**'

Testing:
  paths:
    - 'tests/**'
    - 'test/**'
    - '**/*.test.*'
    - '**/*.spec.*'


# ————— Dependency files —————
Dependencies:
  paths:
    - 'requirements.txt'
    - '**/requirements.txt'
    - 'package.json'
    - '**/package.json'
    - 'package-lock.json'
    - 'yarn.lock'
    - 'pnpm-lock.yaml'
    - 'Gemfile'
    - 'Gemfile.lock'
    - 'Pipfile'
    - 'Pipfile.lock'
