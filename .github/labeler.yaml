# .github/labeler.yaml

# ————— Branch-based labels —————
Bugfix:
  - head-branch:
      - '^bugfix/.*'
Hotfix:
  - head-branch:
      - '^hotfix/.*'
Feature:
  - head-branch:
      - '^feature/.*'
Release:
  - head-branch:
      - '^release/.*'
Support:
  - head-branch:
      - '^support/.*'

# ————— GitHub meta —————
GitHub:
  - changed-files:
      - any-glob-to-any-file: '.github/**'
GitHub-Workflows:
  - changed-files:
      - any-glob-to-any-file: '.github/workflows/**'
GitHub-Issue-Templates:
  - changed-files:
      - any-glob-to-any-file: '.github/ISSUE_TEMPLATE/**'

# ————— Major areas —————
APIs:
  - changed-files:
      - any-glob-to-any-file: 'apis/**'
User-Interfaces:
  - changed-files:
      - any-glob-to-any-file: 'user-interfaces/**'
Docker:
  - changed-files:
      - any-glob-to-any-file: 'docker/**'
Libs:
  - changed-files:
      - any-glob-to-any-file: 'libs/**'

# ————— Sample sub-areas —————
Authentication:
  - changed-files:
      - any-glob-to-any-file: 'apis/auth/**'
Discord-Bot:
  - changed-files:
      - any-glob-to-any-file: 'apis/discord-bot/**'
Frontend:
  - changed-files:
      - any-glob-to-any-file: 'user-interfaces/frontend/**'

# ————— Documentation & tests —————
Documentation:
  - changed-files:
      - any-glob-to-any-file: '**/*.md'
      - any-glob-to-any-file: 'docs/**'
Testing:
  - changed-files:
      - any-glob-to-any-file: 'tests/**'
      - any-glob-to-any-file: 'test/**'
      - any-glob-to-any-file: '**/*.test.*'
      - any-glob-to-any-file: '**/*.spec.*'

# ————— Dependency files —————
Dependencies:
  - changed-files:
      - any-glob-to-any-file: 'requirements.txt'
      - any-glob-to-any-file: '**/requirements.txt'
      - any-glob-to-any-file: 'package.json'
      - any-glob-to-any-file: '**/package.json'
      - any-glob-to-any-file: 'package-lock.json'
      - any-glob-to-any-file: 'yarn.lock'
      - any-glob-to-any-file: 'pnpm-lock.yaml'
      - any-glob-to-any-file: 'Gemfile'
      - any-glob-to-any-file: 'Gemfile.lock'
      - any-glob-to-any-file: 'Pipfile'
      - any-glob-to-any-file: 'Pipfile.lock'
