# .github/workflows/sync-milestones.yaml
name: Sync Milestones

on:
  schedule:
    - cron: '0 0 * * *'   # every night at midnight
  workflow_dispatch:     # manual trigger

jobs:
  sync-milestones:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyGithub pyyaml

      - name: Sync milestones
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python << 'EOF'
          import os, yaml
          from datetime import datetime
          from github import Github

          gh = Github(os.environ['GITHUB_TOKEN'])
          owner, repo_name = os.environ['REPO'].split('/')
          repo = gh.get_repo(f"{owner}/{repo_name}")

          with open('.github/milestones.yaml') as f:
              milestones = yaml.safe_load(f)['milestones']

          existing = {m.title: m for m in repo.get_milestones()}

          for m in milestones:
              title = m['title']
              state = m.get('state', 'open')
              desc  = m.get('description', '')
              due_str = m.get('due_on')
              # parse the ISO string into a datetime
              due_dt = datetime.fromisoformat(due_str.replace('Z', '+00:00')) if due_str else None

              if title in existing:
                  existing[title].edit(
                    title=title,
                    state=state,
                    description=desc,
                    due_on=due_dt
                  )
                  print(f"Updated: {title}")
              else:
                  repo.create_milestone(
                    title=title,
                    state=state,
                    description=desc,
                    due_on=due_dt
                  )
                  print(f"Created: {title}")
          EOF

