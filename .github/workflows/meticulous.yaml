name: Meticulous

on:
  push:
    branches: [ master ]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write
  statuses: read

jobs:
  test:
    name: Meticulous
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: pnpm@10.10.0+sha512.d615db246fe70f25dcfea6d8d73dee782ce23e2245e3c4f6f888249fb568149318637dca73c2c5c8ef2a4ca0d5657fb9567188bfab47f566d1ee6ce987815c39

      # 2) Setup Node.js (v20) + Corepack (pnpm)
      - name: Setup Node.js & enable pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3) Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --non-interactive

      # 4) Build your app
      - name: Build project
        run: pnpm build

      # 5) (Optional) Export static assets for Meticulous
      - name: Export static assets
        run: pnpm exec next export -o out

      # 6) Publish the static folder to Meticulous
      - name: Run Meticulous tests
        uses: alwaysmeticulous/report-diffs-action/upload-assets@v1
        with:
          api-token: ${{ secrets.METICULOUS_API_TOKEN }}
          app-directory: out
