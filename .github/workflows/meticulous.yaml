name: Meticulous

on:
  push:
    branches:
      - master
  pull_request: {}
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write
  statuses: read

jobs:
  test:
    name: Meticulous
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Install Node & PNPM, with built-in caching
      - name: Setup Node.js & PNPM cache
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      # 3) Install deps
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --non-interactive

      # 4) Build your app (adjust if your build script is different)
      - name: Build project
        run: pnpm build

      # 5) If you’re using Next.js, export out a static “out/” folder
      #    so Meticulous has actual HTML/CSS/JS to diff.
      - name: Export static assets
        run: pnpm exec next export -o out

      # 6) Publish the static folder to Meticulous
      - name: Run Meticulous tests
        uses: alwaysmeticulous/report-diffs-action/upload-assets@v1
        with:
          api-token: ${{ secrets.METICULOUS_API_TOKEN }}
          app-directory: out
