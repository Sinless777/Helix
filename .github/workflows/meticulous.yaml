name: Meticulous

on:
  push:
    branches: [ master ]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: write
  statuses: read

jobs:
  test:
    name: Meticulous
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Setup Node.js (v20) + Corepack (pnpm)
      - name: Setup Node.js & enable pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
        # Corepack is bundled with Node 20, so pnpm is on the PATH now

      # 3) Install dependencies
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --non-interactive

      # 4) Build your app
      - name: Build project
        run: pnpm build

      # 5) (Optional) Export static assets for Meticulous
      - name: Export static assets
        run: pnpm exec next export -o out

      # 6) Publish the static folder to Meticulous
      - name: Run Meticulous tests
        uses: alwaysmeticulous/report-diffs-action/upload-assets@v1
        with:
          api-token: ${{ secrets.METICULOUS_API_TOKEN }}
          app-directory: out
