name: "Code Scanning"

on:
  push:
    branches: 
      - master
      - develop
      - feature/*
      - hotfix/*
      - release/*

  pull_request:
    branches: 
      - master
      - develop
      - feature/*
      - hotfix/*
      - release/*

jobs:
  codeql:
    name: "CodeQL Analysis"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v1
        with:
          languages: # ['javascript', 'python', 'rust', 'ruby', 'typescript', 'go', 'cpp']
            - javascript
            - python
            - rust
            - ruby
            - typescript
            - go
            - cpp

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v1
