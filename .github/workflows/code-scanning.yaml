name: "Code Scanning - CodeQL"

on:
  push:
    branches:
      - master
      - develop
      - 'feature/*'
      - 'hotfix/*'
      - 'release/*'
  pull_request:
    branches:
      - master
      - develop
      - 'feature/*'
      - 'hotfix/*'
      - 'release/*'
  schedule:
    - cron: '0 0 * * 0'  # every Sunday at midnight UTC

permissions:
  contents: read          # for checkout
  security-events: write  # to upload CodeQL alerts

jobs:
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      matrix:
        language: [ 'javascript', 'typescript', 'python', 'go', 'cpp' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # If you have a build step (e.g. TS, Go, Rust), uncomment and adjust:
      - name: Set up Node.js (for JS/TS)
        if: matrix.language == 'javascript' || matrix.language == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies (JS/TS)
        if: matrix.language == 'javascript' || matrix.language == 'typescript'
        run: pnpm install --frozen-lockfile

      - name: Build (JS/TS)
        if: matrix.language == 'javascript' || matrix.language == 'typescript'
        run: pnpm run build

      # Init CodeQL          
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}

      # Autobuild picks up your build for compiled langs
      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          # optional: only upload alerts for this language
          category: ${{ matrix.language }}
