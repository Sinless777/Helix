name: "Code Scanning - CodeQL"

on:
  push:
    branches:
      - master
      - develop
      - 'feature/*'
      - 'hotfix/*'
      - 'release/*'
  pull_request:
    branches:
      - master
      - develop
      - 'feature/*'
      - 'hotfix/*'
      - 'release/*'
  schedule:
    - cron: '0 0 * * 0'  # every Sunday at midnight UTC

permissions:
  contents: read
  security-events: write

jobs:
  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    strategy:
      matrix:
        language: [ 'javascript', 'typescript', 'python', 'go', 'cpp' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 1) Install pnpm so it's on PATH
      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false                  # only installs pnpm, does not run `pnpm install` yet :contentReference[oaicite:0]{index=0}

      # 2) Install Node.js and configure pnpm cache
      - name: Setup Node.js
        if: matrix.language == 'javascript' || matrix.language == 'typescript'
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'                      # caches pnpm’s store directory :contentReference[oaicite:1]{index=1}

      # 3) Install dependencies via pnpm
      - name: Install dependencies (JS/TS)
        if: matrix.language == 'javascript' || matrix.language == 'typescript'
        run: pnpm install --frozen-lockfile   # now pnpm is available on PATH :contentReference[oaicite:2]{index=2}

      # 4) Run your build
      - name: Build (JS/TS)
        if: matrix.language == 'javascript' || matrix.language == 'typescript'
        run: pnpm run build

      # 5) Initialize CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}

      # 6) Autobuild for compiled languages
      - name: Autobuild
        uses: github/codeql-action/autobuild@v2

      # 7) Perform analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2
        with:
          category: ${{ matrix.language }}
