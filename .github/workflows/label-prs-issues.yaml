name: Labeler

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * *' # Runs every day at 6 PM UTC

env:
  PR_EXISTS: false

permissions:
  contents: read       # to checkout and scan files
  pull-requests: write # to add labels on PRs
  issues: write        # <— needed to create labels if they don’t exist

jobs:
  labeler:
    name: Labeler
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4 # v4
        with:
          repository: ${{ github.repository }}

      - name: Check if Pull Request exists
        id: pr_exists
        run: |
          if [ "${{ github.event.pull_request }}" != "" ]; then
            echo "PR_EXISTS=true" >> $GITHUB_ENV
          else
            echo "PR_EXISTS=false" >> $GITHUB_ENV
          fi

      - name: Run Labeler
        # if: env.PR_EXISTS == 'false'
        uses: actions/labeler@v5 # v5
        with:
          configuration-path: .github/labeler.yaml
          sync-labels: true
